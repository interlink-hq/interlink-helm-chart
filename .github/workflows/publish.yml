name: Publish and Sign OCI Chart

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.14.0'

      - name: Push chart via Chartpress
        run: |
          chartpress --push

      - name: Set up Cosign
        uses: sigstore/setup-cosign@v3

      - name: Sign OCI repository
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign sign --recursive \
            oci://ghcr.io/interlink-hq/interlink-helm-chart/interlink